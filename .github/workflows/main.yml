name: SADEW-MD-WORKFLOW

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @google/generative-ai --legacy-peer-deps
          npm install axios --legacy-peer-deps
          npm install groq-sdk --legacy-peer-deps
          npm install sharp --legacy-peer-deps
          npm install -g pm2

      - name: Check FFmpeg
        run: |
          ffmpeg -version
          ffmpeg -filters | grep drawtext

      - name: Start SADEW-MD
        run: |
          npm start
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
