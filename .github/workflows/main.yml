name: SADEW-MD-24-7-LOOP

on:
  push:
    branches: [ main ]

  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

concurrency:
  group: sadew-md-bot-loop
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Prepare Bot Folders
        run: |
          mkdir -p tmp downloads

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g pm2

      - name: Check FFmpeg
        run: |
          ffmpeg -version
          ffmpeg -filters | grep drawtext

      - name: Run SADEW-MD for 5 Hours 15 Minutes
        run: |
          timeout 18900s npm start || true
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_TOKEN: ${{ secrets.DEEPSEEK_TOKEN }}
          WHITESHADOW_API_TOKEN: ${{ secrets.WHITESHADOW_API_TOKEN }}
          TMPDIR: ${{ github.workspace }}/tmp
          TEMP: ${{ github.workspace }}/tmp
          TMP: ${{ github.workspace }}/tmp

      - name: Trigger Next Loop Lifecycle
        if: always()
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-bot.yml/dispatches \
            -d '{"ref":"main"}'
