name: SADEW-MD-WORKFLOW

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # <--- මෙන්න මේකයි අපි වෙනස් කළේ

      - name: Install Dependencies
        run: |
          npm install --force
          npm install -g pm2

      - name: Start SADEW-MD
        run: |
          npm start
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
