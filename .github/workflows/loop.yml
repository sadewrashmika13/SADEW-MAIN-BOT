name: 24/7 Bot Loop

on:
  push:
    branches: [ main ] # උඹේ ප්‍රධාන බ්‍රාන්ච් එක master නම් මේක master කරන්න
  schedule:
    - cron: '0 */6 * * *' # මොකක් හරි නෙට්වර්ක් අවුලකින් ලූප් එක කැඩුනොත් හැම පැය 6කටම සැරයක් ඔටෝම ස්ටාර්ට් වෙන්න බැකප් එකක්
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Bot with 5.15 Hour Timeout
      run: |
        # පැය 5යි විනාඩි 15ක් (තත්පර 18900ක්) බොට්ව රන් කරලා ඊට පස්සේ Exit වෙනවා
        timeout 18900s npm start || true

    - name: Trigger Next Loop Lifecycle
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/${{ github.repository }}/actions/workflows/loop.yml/dispatches \
        -d '{"ref":"main"}' # උඹේ බ්‍රාන්ච් එක master නම් මේ 'main' කියන එක 'master' කරන්න
